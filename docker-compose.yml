services:
  # MongoDB
  mongo:
    image: mongo:7
    container_name: agrovision-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AI Service (FastAPI Python)
  ai-service:
    build: ./ai-service
    container_name: agrovision-ai
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Backend (Express.js)
  backend:
    build: ./backend/api-gateway
    container_name: agrovision-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/agrovision
      JWT_SECRET: ${JWT_SECRET:-agrovision_jwt_secret_change_in_prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-agrovision_refresh_secret_change_in_prod}
      AI_SERVICE_URL: http://ai-service:8000
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: production
      COOKIE_SECURE: "false"
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
    depends_on:
      mongo:
        condition: service_healthy
      ai-service:
        condition: service_started
    restart: unless-stopped

  # Frontend (Next.js)
  frontend:
    build:
      context: ./agrovision-frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    container_name: agrovision-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
